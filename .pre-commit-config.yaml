# Pre-commit hooks para Almapunt E-commerce
# Instala: pip install pre-commit && pre-commit install

repos:
  # Verifica sintaxis Python
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=5000']
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
        args: ['--unsafe']
      - id: debug-statements
      - id: end-of-file-fixer
        exclude: ^README\.md$
      - id: trailing-whitespace
        exclude: ^README\.md$

  # Formateo automático con Black
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3.14
        args: [--line-length=100]

  # Import sorting con isort
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]

  # Flake8 para linting
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=100, --ignore=E501,W503]
        additional_dependencies: [flake8-docstrings]
