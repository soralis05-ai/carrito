# GitHub Actions CI/CD para Almapunt E-commerce
# Ejecuta tests automáticamente en cada push y PR

name: CI/CD - Tests y Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests Unitarios e Integración
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
      
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        cache: 'pip'
        
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Ejecutar tests unitarios
      run: |
        python -m pytest tests/test_auth.py tests/test_cart.py tests/test_products.py -v
        
    - name: Ejecutar tests de integración
      run: |
        python -m pytest tests/test_integration.py -v
        
    - name: Reporte de cobertura
      run: |
        python -m pytest tests/ --cov=app --cov-report=term-missing
        
  build:
    name: Build y Validación
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
      
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        cache: 'pip'
        
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Verificar sintaxis Python
      run: |
        python -m py_compile app/__init__.py
        python -m py_compile app/blueprints/*/*.py
        python -m py_compile app/models/*.py
        
    - name: Validar que la app inicia
      run: |
        python -c "from app import create_app; app = create_app(); print('✅ App inicia correctamente')"
        
  deploy:
    name: Deploy a Producción
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
      
    - name: Notificar deploy
      run: |
        echo "🚀 Deploy automático a producción"
        echo "Branch: ${{ github.ref }}"
        echo "Commit: ${{ github.sha }}"
        echo ""
        echo "Para desplegar en el servidor:"
        echo "  1. Conectar via SSH al servidor"
        echo "  2. git pull origin main"
        echo "  3. source .venv/bin/activate"
        echo "  4. pip install -r requirements.txt"
        echo "  5. flask db upgrade"
        echo "  6. systemctl restart almapunt"
        
